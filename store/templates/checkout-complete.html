{% extends 'base.html' %}
{% block content %}

<div class="bg-white border-b border-gray-100 py-8">
  <h1 class="text-2xl md:text-3xl font-bold text-center text-gray-700">Order Complete</h1>
</div>

<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
  <div class="bg-white rounded-2xl shadow-sm p-10 text-center">
    <div class="w-20 h-20 mx-auto rounded-full bg-green-50 flex items-center justify-center mb-6">
      <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    </div>
    <h2 class="text-xl font-semibold text-gray-800">Thank you for your purchase!</h2>
    <p class="mt-3 text-gray-500 leading-relaxed">
      Your purchase was successful! You will receive an email with links to download
      the books you ordered.
    </p>
    <a href="/" class="inline-block mt-8 px-8 py-3 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition">
      Back to Home
    </a>
  </div>
</div>
{% endblock %}
