{% if slides %}
<section class="bg-white border-b border-gray-100 overflow-hidden">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 relative">

    <!-- Slides container -->
    <div id="slider" class="relative">
      {% for slide in slides %}
      <div class="slider-slide {% if not forloop.first %}hidden{% endif %} flex flex-col md:flex-row items-center gap-8" data-index="{{ forloop.counter0 }}">
        <div class="md:w-1/3 flex justify-center">
          <img
            src="{{ slide.image.url }}"
            alt="{{ slide.title }}"
            class="rounded-2xl shadow-lg max-h-80 object-cover"
          />
        </div>
        <div class="md:w-2/3">
          <h1 class="text-3xl md:text-4xl font-bold text-gray-900 leading-tight">
            {{ slide.title }}
          </h1>
          <blockquote class="mt-4 border-l-4 border-brand-400 pl-4">
            <p class="text-gray-500 text-lg leading-relaxed">
              {{ slide.subtitle }}
            </p>
          </blockquote>
        </div>
      </div>
      {% endfor %}
    </div>

    {% if slides|length > 1 %}
    <!-- Navigation arrows -->
    <button id="slider-prev" class="absolute left-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/80 backdrop-blur shadow-md border border-gray-200 flex items-center justify-center text-gray-500 hover:text-brand-600 hover:border-brand-300 transition-all duration-200 active:scale-95 z-10" aria-label="Previous">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
    </button>
    <button id="slider-next" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/80 backdrop-blur shadow-md border border-gray-200 flex items-center justify-center text-gray-500 hover:text-brand-600 hover:border-brand-300 transition-all duration-200 active:scale-95 z-10" aria-label="Next">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
    </button>

    <!-- Dots -->
    <div class="flex items-center justify-center gap-2 mt-6" id="slider-dots">
      {% for slide in slides %}
      <button class="slider-dot w-2 h-2 rounded-full transition-all duration-300 {% if forloop.first %}bg-brand-500 w-6{% else %}bg-gray-300 hover:bg-gray-400{% endif %}" data-index="{{ forloop.counter0 }}" aria-label="Slide {{ forloop.counter }}"></button>
      {% endfor %}
    </div>
    {% endif %}
  </div>
</section>

<script>
(function() {
  const slides = document.querySelectorAll('.slider-slide');
  if (slides.length <= 1) return;
  const dots = document.querySelectorAll('.slider-dot');
  const prevBtn = document.getElementById('slider-prev');
  const nextBtn = document.getElementById('slider-next');
  let current = 0;
  let interval;

  function goTo(index) {
    slides[current].classList.add('hidden');
    slides[current].classList.remove('slider-fade');
    dots[current].classList.remove('bg-brand-500', 'w-6');
    dots[current].classList.add('bg-gray-300');
    current = (index + slides.length) % slides.length;
    slides[current].classList.remove('hidden');
    void slides[current].offsetWidth;
    slides[current].classList.add('slider-fade');
    dots[current].classList.add('bg-brand-500', 'w-6');
    dots[current].classList.remove('bg-gray-300');
  }

  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }

  function startAuto() { interval = setInterval(next, 5000); }
  function resetAuto() { clearInterval(interval); startAuto(); }

  nextBtn.addEventListener('click', function() { next(); resetAuto(); });
  prevBtn.addEventListener('click', function() { prev(); resetAuto(); });
  dots.forEach(function(dot) {
    dot.addEventListener('click', function() { goTo(+this.dataset.index); resetAuto(); });
  });

  startAuto();
})();
</script>
{% endif %}
